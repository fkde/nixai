[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nixai"
version = "0.1.0"
description = "Local AI agent runner for Ollama models"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "pydantic>=2.8.0",
  "httpx>=0.27.0",
  "typer>=0.12.0",
  "rich>=13.7.0",
  "platformdirs>=4.2.0",
]

[project.optional-dependencies]
desktop = [
  "pywebview>=5.3",
]

[project.scripts]
nixai = "app.cli:main"

[tool.setuptools.packages.find]
include = ["app*"]

[tool.setuptools.package-data]
"app" = ["static/*.html", "static/*.css", "static/*.js"]
