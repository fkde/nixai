<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NixAI Startup Error</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        background: #090c11;
        color: #f5f8ff;
        font-family: ui-monospace, Menlo, monospace;
      }
      .desktop-titlebar {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 10;
        height: 44px;
        user-select: none;
      }
      .window-controls {
        position: fixed;
        top: 14px;
        left: 18px;
        z-index: 20;
        display: flex;
        gap: 8px;
      }
      .window-control {
        width: 13px;
        height: 13px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.32), 0 1px 3px rgba(0, 0, 0, 0.36);
      }
      .window-control.close { background: #ff5f57; }
      .window-control.minimize { background: #ffbd2e; }
      .window-control.zoom { background: #28c840; }
      .card {
        width: min(680px, calc(100vw - 32px));
        padding: 22px 24px;
        border-radius: 12px;
        border: 1px solid rgba(255, 127, 145, 0.44);
        background: rgba(40, 15, 24, 0.56);
      }
      h1 { margin: 0 0 10px; font-size: 20px; }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: #ffcad3;
      }
    </style>
    <script>
      document.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-window-action]");
        if (!button || !window.pywebview?.api) return;
        const methods = { close: "close_window", minimize: "minimize_window", zoom: "zoom_window" };
        const method = methods[button.dataset.windowAction];
        if (method && typeof window.pywebview.api[method] === "function") {
          await window.pywebview.api[method]();
        }
      });
    </script>
  </head>
  <body>
    <div class="desktop-titlebar pywebview-drag-region" aria-hidden="true"></div>
    <div class="window-controls" role="toolbar" aria-label="Window controls">
      <button class="window-control close" type="button" data-window-action="close" aria-label="Close window"></button>
      <button class="window-control minimize" type="button" data-window-action="minimize" aria-label="Minimize window"></button>
      <button class="window-control zoom" type="button" data-window-action="zoom" aria-label="Zoom window"></button>
    </div>
    <section class="card">
      <h1>NixAI konnte nicht starten</h1>
      <pre>{{ message }}</pre>
    </section>
  </body>
</html>
