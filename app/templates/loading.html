<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NixAI</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 15%, rgba(69, 230, 242, 0.2), transparent 32%),
          radial-gradient(circle at 80% 80%, rgba(155, 114, 255, 0.18), transparent 35%),
          linear-gradient(135deg, #05080c, #080d14 60%, #090f18);
        color: #f4fbff;
        font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
      }
      .card {
        width: min(560px, calc(100vw - 32px));
        padding: 26px 28px;
        border-radius: 14px;
        border: 1px solid rgba(121, 218, 255, 0.4);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0)),
          rgba(8, 14, 22, 0.85);
        box-shadow: 0 26px 64px rgba(0, 0, 0, 0.48);
      }
      h1 { margin: 0 0 10px; font-size: 22px; letter-spacing: 0.01em; }
      p { margin: 0; color: #b6d3e2; font-size: 13px; line-height: 1.5; }
      .bar {
        margin-top: 16px;
        width: 100%;
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }
      .bar::before {
        content: "";
        display: block;
        width: 36%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #7be7ff, #9b72ff);
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(290%); }
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>NixAI startet...</h1>
      <p>Lokalen Server initialisieren und UI verbinden.</p>
      <div class="bar"></div>
    </section>
  </body>
</html>
