<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NixAI</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 15%, rgba(69, 230, 242, 0.2), transparent 32%),
          radial-gradient(circle at 80% 80%, rgba(155, 114, 255, 0.18), transparent 35%),
          linear-gradient(135deg, #05080c, #080d14 60%, #090f18);
        color: #f4fbff;
        font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
      }
      .desktop-titlebar {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 10;
        height: 44px;
        user-select: none;
      }
      .window-controls {
        position: fixed;
        top: 14px;
        left: 18px;
        z-index: 20;
        display: flex;
        gap: 8px;
      }
      .window-control {
        width: 13px;
        height: 13px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.32), 0 1px 3px rgba(0, 0, 0, 0.36);
      }
      .window-control.close { background: #ff5f57; }
      .window-control.minimize { background: #ffbd2e; }
      .window-control.zoom { background: #28c840; }
      .card {
        width: min(560px, calc(100vw - 32px));
        padding: 26px 28px;
        border-radius: 14px;
        border: 1px solid rgba(121, 218, 255, 0.4);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0)),
          rgba(8, 14, 22, 0.85);
        box-shadow: 0 26px 64px rgba(0, 0, 0, 0.48);
      }
      h1 { margin: 0 0 10px; font-size: 22px; letter-spacing: 0.01em; }
      p { margin: 0; color: #b6d3e2; font-size: 13px; line-height: 1.5; }
      .bar {
        margin-top: 16px;
        width: 100%;
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }
      .bar::before {
        content: "";
        display: block;
        width: 36%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #7be7ff, #9b72ff);
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(290%); }
      }
    </style>
    <script>
      document.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-window-action]");
        if (!button || !window.pywebview?.api) return;
        const methods = { close: "close_window", minimize: "minimize_window", zoom: "zoom_window" };
        const method = methods[button.dataset.windowAction];
        if (method && typeof window.pywebview.api[method] === "function") {
          await window.pywebview.api[method]();
        }
      });
    </script>
  </head>
  <body>
    <div class="desktop-titlebar pywebview-drag-region" aria-hidden="true"></div>
    <div class="window-controls" role="toolbar" aria-label="Window controls">
      <button class="window-control close" type="button" data-window-action="close" aria-label="Close window"></button>
      <button class="window-control minimize" type="button" data-window-action="minimize" aria-label="Minimize window"></button>
      <button class="window-control zoom" type="button" data-window-action="zoom" aria-label="Zoom window"></button>
    </div>
    <section class="card">
      <h1>NixAI startet...</h1>
      <p>Lokalen Server initialisieren und UI verbinden.</p>
      <div class="bar"></div>
    </section>
  </body>
</html>
